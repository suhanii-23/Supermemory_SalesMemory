services:
  - type: web
    name: salesights-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SUPERMEMORY_API_KEY
        sync: false
      - key: SUPERMEMORY_BASE_URL
        value: https://api.supermemory.ai
      # ANTHROPIC_API_KEY intentionally omitted -- the app runs without a
      # server-side Claude key, relying on visitors pasting their own key
      # into the dashboard sidebar (X-Anthropic-Api-Key header, see
      # mind.py's generate_brief). Add this var manually in the Render
      # dashboard later if you want a server-side fallback key too.
